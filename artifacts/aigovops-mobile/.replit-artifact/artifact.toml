kind = "mobile"
previewPath = "/mobile/"
title = "AIGovOps Mobile"
version = "1.0.0"
id = "artifacts/aigovops-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24296

[services.development]
run = "pnpm --filter @workspace/aigovops-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aigovops-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/aigovops-mobile", "run", "serve" ]

[services.env]
PORT = "24296"
BASE_PATH = "/mobile/"

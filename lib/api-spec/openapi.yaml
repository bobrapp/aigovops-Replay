openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AIGovOps REPLAY API - cryptographically signed AI interaction receipts
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: interactions
    description: AI interaction receipt operations
  - name: policies
    description: Policy-as-code rule operations
  - name: stats
    description: Dashboard statistics
  - name: audit
    description: Admin-only audit log integrity operations
  - name: export
    description: Portable chain export endpoints (JSONL, HTML bundle, SQLite)
  - name: verification
    description: Public receipt verification and chain health
  - name: alerts
    description: Webhook endpoint configuration and delivery tracking for policy violation alerts
  - name: demo
    description: Public no-login demo gallery — pre-seeded receipts plus visitor-supplied "bring your own AI output" mints. No live LLM calls, no policy evaluation, no webhook side effects.
paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      security: []
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      security: []
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    post:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      security: []
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Session cleared. Navigate the browser to the returned URL to complete OIDC logout.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserLogoutSuccess'
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      security: []
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /interactions:
    get:
      operationId: listInteractions
      tags: [interactions]
      summary: List all interaction receipts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
            maximum: 100000
        - name: model
          in: query
          schema:
            type: string
        - name: policyStatus
          in: query
          schema:
            type: string
            enum: [pass, fail, pending, error]
      responses:
        "200":
          description: List of interaction receipts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionList"
    post:
      operationId: createInteraction
      tags: [interactions]
      summary: Create a new AI interaction receipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInteractionBody"
      responses:
        "201":
          description: Created interaction receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interaction"

  /interactions/{id}:
    get:
      operationId: getInteraction
      tags: [interactions]
      summary: Get a single interaction receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Interaction receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interaction"
        "404":
          description: Not found

  /interactions/{id}/verify:
    get:
      operationId: verifyInteraction
      tags: [interactions]
      summary: Verify the cryptographic chain for a receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"

  /interactions/{id}/replay:
    post:
      operationId: replayInteraction
      tags: [interactions]
      summary: Replay an interaction and compare outputs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Replay result with diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayResult"

  /policies:
    get:
      operationId: listPolicies
      tags: [policies]
      summary: List all policy rules
      responses:
        "200":
          description: List of policies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyList"
    post:
      operationId: createPolicy
      tags: [policies]
      summary: Create a new policy rule
      description: Requires admin privilege (caller's user ID must be in the ADMIN_USER_IDS server environment variable).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyBody"
      responses:
        "201":
          description: Created policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "403":
          description: Forbidden — admin privilege required
        "422":
          description: >
            Unprocessable — rule expression failed semantic validation.
            The rule may reference disallowed identifiers, use forbidden
            constructs (eval, new Function, etc.), or exceed 500 characters.

  /policies/{id}:
    get:
      operationId: getPolicy
      tags: [policies]
      summary: Get a single policy rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
    patch:
      operationId: updatePolicy
      tags: [policies]
      summary: Update a policy rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyBody"
      responses:
        "200":
          description: Updated policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "403":
          description: Forbidden — admin privilege required
        "422":
          description: >
            Unprocessable — rule expression failed semantic validation.
            The rule may reference disallowed identifiers, use forbidden
            constructs (eval, new Function, etc.), or exceed 500 characters.
    delete:
      operationId: deletePolicy
      tags: [policies]
      summary: Delete a policy rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /chain:
    get:
      operationId: getChain
      tags: [interactions]
      summary: Get the full hash chain summary
      description: >
        Returns integrity metadata for the authenticated user's receipt chain.
        `length` is the total number of the caller's receipts (full count, not
        a windowed subset). `intact` and the fork/broken-link counts are
        computed over all of the caller's receipts with no window limit.
        `entries` contains the caller's most recent 100 receipts for display
        purposes only — integrity is always verified over the full set.
      responses:
        "200":
          description: Hash chain summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainSummary"

  /audit/chain-status:
    get:
      operationId: getAuditChainStatus
      tags: [audit]
      summary: Verify the integrity of the audit log hash chain
      description: >
        Admin-only. Walks all activity_log entries that have a logHash (post-migration
        rows) in chronological order and re-derives each entry's expected logHash from
        its stored fields and the expected prevLogHash from the chain walk. Any
        mismatch — tampered data fields, deleted rows, reordered entries, or modified
        hashes — increments the tampered counter. Pre-migration rows with NULL logHash
        are counted in `total` but excluded from verification.
      security:
        - adminCookieAuth: []
      responses:
        "200":
          description: Audit log chain status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditChainStatus"
        "401":
          description: Unauthorized — admin session required
        "503":
          description: Service unavailable — ADMIN_API_KEY not configured

  /interactions/{id}/share-token:
    post:
      operationId: createShareToken
      tags: [verification]
      summary: Generate a public share token for a receipt's verification result
      description: >
        Authenticated, owner-only. Creates a short-lived opaque bearer token that
        grants read-only public access to this receipt's verification result via
        GET /verify/{id}?token=... — no account required to view it.
        The raw token is a 32-byte cryptographically random value; only its
        SHA-256 hash is stored in the database so a DB dump never leaks usable tokens.
        Expiry is configurable via SHARE_TOKEN_EXPIRY_DAYS (default 7 days).
        The `redact` flag is stored on the token and enforced server-side;
        the recipient cannot override it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareTokenBody"
      responses:
        "201":
          description: Share token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareTokenResult"
        "403":
          description: Forbidden — receipt belongs to another user
        "404":
          description: Not found

  /verify/{id}:
    get:
      operationId: getPublicVerification
      tags: [verification]
      summary: Public receipt verification via share token (no login required)
      description: >
        Token-gated public endpoint. Validates the share token, then returns the
        receipt's verification result. Redaction is controlled by the issuer at
        share-link generation time (the `redact` field on CreateShareTokenBody)
        and is enforced server-side — the recipient cannot override it.
        Returns 401 when the token is missing, expired, or invalid.
        Returns 422 when the chain ancestry walk is truncated by the depth limit.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicVerificationResult"
        "401":
          description: Token missing, expired, or invalid
        "404":
          description: Receipt not found
        "422":
          description: Chain depth limit exceeded — ancestry walk was truncated

  /chain/health:
    get:
      operationId: getChainHealth
      tags: [verification]
      summary: Re-verify every receipt in the authenticated user's chain
      description: >
        Walks all of the authenticated user's receipts oldest-first, re-derives
        each hash, and checks that each receipt's prevHash equals the preceding
        receipt's chainHash. Returns a health summary: total receipts, count of
        valid receipts, the first receipt ID that failed (if any), and elapsed
        time. Capped at CHAIN_HEALTH_ROW_CAP rows (default 50 000) to prevent
        abuse on very long chains.
      responses:
        "200":
          description: Chain health summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainHealthResult"
        "401":
          description: Unauthorized

  /export/jsonl:
    get:
      operationId: exportChainJsonl
      tags: [export]
      summary: Export the full receipt chain as JSONL
      description: >
        Streams the authenticated user's receipts as newline-delimited JSON (one
        object per line), ordered oldest-first. Each line contains all receipt
        fields including hashes. The file is chunked so very large chains are
        never fully buffered in memory. Filename pattern:
        aigovops-chain-{userId}-{date}.jsonl
      responses:
        "200":
          description: JSONL stream of receipts
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="aigovops-chain-{userId}-{date}.jsonl"
          content:
            application/x-ndjson:
              schema:
                type: string
        "401":
          description: Unauthorized — authentication required

  /export/html:
    get:
      operationId: exportChainHtml
      tags: [export]
      summary: Export the receipt chain as a self-contained HTML bundle
      description: >
        Returns a single .html file with all receipts rendered as cards plus
        embedded JavaScript that re-derives every chainHash client-side on load
        and shows a green "Chain intact" or red "Tampered" banner. No external
        dependencies. Filename pattern: aigovops-chain-{userId}-{date}.html
      responses:
        "200":
          description: Self-contained HTML bundle
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="aigovops-chain-{userId}-{date}.html"
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Unauthorized — authentication required

  /export/sqlite:
    get:
      operationId: exportChainSqlite
      tags: [export]
      summary: Export the receipt chain as a SQLite database
      description: >
        Returns a .db file containing an interactions table populated with all
        of the requesting user's receipts. Compatible with the sqlite3 CLI and
        DB Browser for SQLite. Filename pattern:
        aigovops-chain-{userId}-{date}.db
      responses:
        "200":
          description: SQLite database file
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="aigovops-chain-{userId}-{date}.db"
          content:
            application/x-sqlite3:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized — authentication required

  /webhooks:
    get:
      operationId: listWebhooks
      tags: [alerts]
      summary: List webhook endpoints
      description: >
        Returns all webhook endpoints configured by the authenticated user,
        ordered newest-first. Secrets are never returned; hasSecret:boolean
        indicates whether an HMAC secret is configured.
      responses:
        "200":
          description: List of webhook endpoints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpointList"
        "401":
          description: Unauthorized
    post:
      operationId: createWebhook
      tags: [alerts]
      summary: Create a webhook endpoint
      description: >
        Creates a new webhook endpoint for the authenticated user. Max 10 endpoints
        per user. The URL is validated against an SSRF blocklist (private ranges,
        loopback, link-local addresses are rejected).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookBody"
      responses:
        "201":
          description: Created webhook endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "422":
          description: URL is private/unsafe, or user has reached the 10-endpoint limit

  /webhooks/{id}:
    patch:
      operationId: updateWebhook
      tags: [alerts]
      summary: Update a webhook endpoint
      description: >
        Partially update a webhook endpoint. All fields are optional. The url field
        is re-validated against the SSRF blocklist if provided. Passing secret:null
        clears the existing HMAC secret.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWebhookBody"
      responses:
        "200":
          description: Updated webhook endpoint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookEndpoint"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Endpoint belongs to another user
        "404":
          description: Endpoint not found
        "422":
          description: URL is private or unsafe
    delete:
      operationId: deleteWebhook
      tags: [alerts]
      summary: Delete a webhook endpoint
      description: >
        Deletes the webhook endpoint and all associated delivery records.
        This action is irreversible.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Endpoint deleted
        "401":
          description: Unauthorized
        "403":
          description: Endpoint belongs to another user
        "404":
          description: Endpoint not found

  /webhooks/{id}/test:
    post:
      operationId: testWebhook
      tags: [alerts]
      summary: Send a test webhook
      description: >
        Sends a synthetic policy.violation payload to the endpoint URL and returns
        the HTTP response code. Does not create a delivery record. Useful for
        verifying that the endpoint is reachable and correctly configured.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Test delivery result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTestResult"
        "401":
          description: Unauthorized
        "403":
          description: Endpoint belongs to another user
        "404":
          description: Endpoint not found

  /webhooks/{id}/deliveries:
    get:
      operationId: listWebhookDeliveries
      tags: [alerts]
      summary: List recent deliveries for a webhook endpoint
      description: >
        Returns the 50 most recent delivery records for the given endpoint,
        ordered newest-first. Each record shows status, attempt count,
        last HTTP response code, and timestamps.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of delivery records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeliveryList"
        "401":
          description: Unauthorized
        "403":
          description: Endpoint belongs to another user
        "404":
          description: Endpoint not found

  /demo/chain:
    get:
      tags: [demo]
      operationId: getDemoChain
      summary: Get the public demo chain
      description: >
        Returns the most recent receipts on the shared public demo chain. This
        endpoint is anonymous — no authentication required. The chain combines
        boot-time seeded fixtures with visitor-supplied mints from POST
        /demo/mint. Capped at 50 most-recent rows; deep pagination is
        intentionally not exposed.
      security: []
      responses:
        "200":
          description: Public demo chain entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoChain"
  /demo/mint:
    post:
      tags: [demo]
      operationId: createDemoMint
      summary: Mint a demo receipt from a visitor-supplied AI prompt + response
      description: >
        Anonymous "bring your own AI output" mint. The visitor supplies a
        prompt, response, and model identifier; the server returns a real
        cryptographically chained receipt under the shared public demo user.

        Hard limits: prompt ≤ 2 KiB, response ≤ 32 KiB, model ≤ 100 chars.
        Per-IP rate limit of 3 requests per hour. No live LLM call is made,
        no policy evaluation runs, no webhook deliveries are enqueued, and
        no activity_log entries are written for demo mints.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DemoMintBody"
      responses:
        "201":
          description: Demo receipt minted and added to the public chain.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoReceipt"
        "400":
          description: Invalid request body (missing field or size limit exceeded).
        "429":
          description: Per-IP rate limit reached (3 mints per hour).

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    adminCookieAuth:
      type: apiKey
      in: cookie
      name: aigovops_admin
      description: Session token passed as a Bearer token in the Authorization header (used by mobile clients)

  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    BrowserLogoutSuccess:
      type: object
      required: [redirectUrl]
      properties:
        redirectUrl:
          type: string
          format: uri
          description: The OIDC provider logout URL to navigate the browser to.
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string


    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Interaction:
      type: object
      properties:
        id:
          type: string
        prompt:
          type: string
        response:
          type: string
        model:
          type: string
        userId:
          type: string
        tags:
          type: array
          items:
            type: string
        promptHash:
          type: string
        responseHash:
          type: string
        prevHash:
          type: string
          nullable: true
        chainHash:
          type: string
        policyStatus:
          type: string
          enum: [pass, fail, pending, error]
        policyViolations:
          type: array
          description: >
            List of policy violations triggered by this receipt. Each entry
            contains the severity label and policy name only (e.g.
            "[HIGH] No PII in prompts"). The rule expression is intentionally
            omitted to prevent users from reverse-engineering governance logic
            and evading future policy checks. Full rule details are available
            to administrators via the policy management endpoints.
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        replayCount:
          type: integer
      required:
        - id
        - prompt
        - response
        - model
        - userId
        - tags
        - promptHash
        - responseHash
        - chainHash
        - policyStatus
        - policyViolations
        - createdAt
        - replayCount

    InteractionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Interaction"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    CreateInteractionBody:
      type: object
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 32768
          description: The AI prompt text. Maximum 32 KiB to prevent per-field resource exhaustion.
        response:
          type: string
          minLength: 1
          maxLength: 32768
          description: The AI response text. Maximum 32 KiB to prevent per-field resource exhaustion.
        model:
          type: string
          minLength: 1
          maxLength: 200
          description: Model identifier string (e.g. "gpt-4o"). Maximum 200 characters.
        tags:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 100
          description: Optional classification tags. Maximum 50 tags, each up to 100 characters.
      required:
        - prompt
        - response
        - model

    VerificationResult:
      type: object
      description: >
        Result of a multi-step cryptographic chain verification. Four independent
        checks are performed and combined into a single `valid` verdict:
        (1) prompt content hash re-computation,
        (2) response content hash re-computation,
        (3) chainHash self-consistency check (recomputed from stored promptHash,
            responseHash, and prevHash) plus predecessor existence check plus
            recursive-CTE ancestry walk for forks, and
        (4) global genesis uniqueness (exactly one receipt with null prevHash).
        `valid` is true only when all four checks pass.
      properties:
        id:
          type: string
        valid:
          type: boolean
          description: >
            True only when prompt hash, response hash, chainHash, predecessor
            existence, ancestry fork detection, and genesis uniqueness all pass.
        promptHashMatch:
          type: boolean
          description: Re-computed prompt hash matches the stored promptHash.
        responseHashMatch:
          type: boolean
          description: Re-computed response hash matches the stored responseHash.
        chainIntact:
          type: boolean
          description: >
            True when: chainHash is self-consistent with stored fields; the
            predecessor receipt exists (if prevHash is non-null); no fork is
            detected anywhere in this receipt's ancestry; and there is exactly
            one genesis entry globally.
        details:
          type: string
          description: >
            Human-readable summary. On failure, lists each specific check that
            failed (e.g. "predecessor receipt not found", "fork detected in
            ancestry", "multiple genesis entries").
        checkedAt:
          type: string
          format: date-time
      required:
        - id
        - valid
        - promptHashMatch
        - responseHashMatch
        - chainIntact
        - details
        - checkedAt

    ReplayResult:
      type: object
      properties:
        originalId:
          type: string
        originalResponse:
          type: string
        replayedResponse:
          type: string
        outputDiff:
          type: string
        semanticMatch:
          type: boolean
        replayedAt:
          type: string
          format: date-time
        newReceiptId:
          type: string
      required:
        - originalId
        - originalResponse
        - replayedResponse
        - outputDiff
        - semanticMatch
        - replayedAt
        - newReceiptId

    Policy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        rule:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        enabled:
          type: boolean
        violationCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - rule
        - severity
        - enabled
        - violationCount
        - createdAt
        - updatedAt

    PolicyList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Policy"
        total:
          type: integer
      required:
        - items
        - total

    CreatePolicyBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        rule:
          type: string
          minLength: 1
          maxLength: 500
          description: >
            A safe expression evaluated against each new interaction receipt.
            Allowed variables: prompt, response, model, userId.
            Allowed operators: &&, ||, !, ===, !==, <, >, <=, >=, typeof.
            Allowed string methods: .includes(), .startsWith(), .endsWith(),
            .toLowerCase(), .toUpperCase(), .trim(), .split(), .length.
            No code execution: eval, new Function, process, require, and
            globalThis are not reachable. Maximum 500 characters.
        severity:
          type: string
          enum: [low, medium, high, critical]
        enabled:
          type: boolean
      required:
        - name
        - description
        - rule
        - severity

    UpdatePolicyBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        rule:
          type: string
          minLength: 1
          maxLength: 500
          description: >
            A safe expression evaluated against each new interaction receipt.
            Allowed variables: prompt, response, model, userId.
            Allowed operators: &&, ||, !, ===, !==, <, >, <=, >=, typeof.
            Allowed string methods: .includes(), .startsWith(), .endsWith(),
            .toLowerCase(), .toUpperCase(), .trim(), .split(), .length.
            No code execution: eval, new Function, process, require, and
            globalThis are not reachable. Maximum 500 characters.
        severity:
          type: string
          enum: [low, medium, high, critical]
        enabled:
          type: boolean

    Stats:
      type: object
      properties:
        totalInteractions:
          type: integer
        verifiedCount:
          type: integer
        policyPassCount:
          type: integer
        policyFailCount:
          type: integer
        replayCount:
          type: integer
        modelsUsed:
          type: array
          maxItems: 200
          items:
            type: string
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        chainLength:
          type: integer
          description: >
            Total number of receipts in the global chain across all users
            (full count, not a windowed subset).
        chainIntact:
          type: boolean
          description: >
            True only when the global chain (all users, all receipts) has no
            broken links and no forks (checked over the entire chain, not a
            windowed subset).
      required:
        - totalInteractions
        - verifiedCount
        - policyPassCount
        - policyFailCount
        - replayCount
        - modelsUsed
        - recentActivity
        - chainLength
        - chainIntact

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [created, replayed, verified, policy_check]
        interactionId:
          type: string
        summary:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - interactionId
        - summary
        - createdAt

    AuditChainStatus:
      type: object
      description: >
        Integrity status of the activity_log hash chain. Entries with NULL logHash
        (pre-migration legacy rows) are counted in `total` but excluded from
        `hashableEntries` and hash verification.
      properties:
        total:
          type: integer
          description: Total activity_log rows (including pre-migration rows without hashes)
        hashableEntries:
          type: integer
          description: Rows with a logHash that participate in chain verification
        intact:
          type: boolean
          description: >
            True only when all hashable entries re-verify correctly in sequence.
            False if any entry's logHash does not match the re-derived expected hash.
        tampered:
          type: integer
          description: Count of hashable entries that failed hash verification
        headHash:
          type: string
          nullable: true
          description: logHash of the most recent hashable entry; null if no hashed entries exist
        verifiedAt:
          type: string
          format: date-time
          description: Timestamp of when this verification was performed
      required:
        - total
        - hashableEntries
        - intact
        - tampered
        - verifiedAt

    CreateShareTokenBody:
      type: object
      description: >
        Optional body for POST /interactions/{id}/share-token.
        The `redact` flag is stored on the token and enforced server-side in
        GET /verify/{id} — the recipient cannot override it.
      properties:
        redact:
          type: boolean
          default: false
          description: >
            When true, the public verification result will omit the prompt and
            response regardless of what the link recipient passes in the query
            string. Use this to share the cryptographic proof without exposing
            the conversation content.

    ShareTokenResult:
      type: object
      properties:
        token:
          type: string
          description: Raw share token to embed in the public verification URL.
        verifyUrl:
          type: string
          description: Full public URL for sharing (includes token in query string).
        expiresAt:
          type: string
          format: date-time
          description: ISO-8601 timestamp when this token expires (default 7 days from now).
      required:
        - token
        - verifyUrl
        - expiresAt

    PublicVerificationResult:
      type: object
      description: >
        Verification result returned from the public (token-gated) verify endpoint.
        Does not require a logged-in session. Prompt and response are present
        unless the issuer enabled redaction at share-link generation time (the
        `redact` field in CreateShareTokenBody). Redaction is enforced server-side
        from the stored token row — the recipient cannot override it.
      properties:
        id:
          type: string
        model:
          type: string
        createdAt:
          type: string
          format: date-time
        prompt:
          type: string
          nullable: true
          description: Full prompt text, or null when the issuer requested redaction.
        response:
          type: string
          nullable: true
          description: Full response text, or null when the issuer requested redaction.
        redacted:
          type: boolean
          description: True when prompt and response have been omitted at the issuer's request.
        promptHash:
          type: string
        responseHash:
          type: string
        chainHash:
          type: string
        prevHash:
          type: string
          nullable: true
        policyStatus:
          type: string
          enum: [pass, fail, pending, error]
        valid:
          type: boolean
        promptHashMatch:
          type: boolean
        responseHashMatch:
          type: boolean
        chainIntact:
          type: boolean
        details:
          type: string
        checkedAt:
          type: string
          format: date-time
      required:
        - id
        - model
        - createdAt
        - redacted
        - promptHash
        - responseHash
        - chainHash
        - policyStatus
        - valid
        - promptHashMatch
        - responseHashMatch
        - chainIntact
        - details
        - checkedAt

    ChainHealthResult:
      type: object
      description: >
        Result of a full chain re-verification walk. Every receipt is checked
        oldest-first: hashes are re-derived and each receipt's prevHash must equal
        the preceding receipt's chainHash. Capped at CHAIN_HEALTH_ROW_CAP rows
        (default 50 000) to guard against unbounded scans.
      properties:
        total:
          type: integer
          description: Number of receipts examined (may be less than chain length when capped)
        valid:
          type: integer
          description: Number of receipts that passed all hash checks
        firstFailedId:
          type: string
          nullable: true
          description: ID of the first receipt that failed verification, or null if all passed
        capped:
          type: boolean
          description: True when the walk was cut short by the row cap
        elapsedMs:
          type: integer
          description: Wall-clock milliseconds the verification walk took
      required:
        - total
        - valid
        - firstFailedId
        - capped
        - elapsedMs

    ChainSummary:
      type: object
      properties:
        length:
          type: integer
          description: Total number of receipts in the chain (full count, not a window)
        headHash:
          type: string
        tailHash:
          type: string
          nullable: true
        intact:
          type: boolean
          description: True only when the full chain has no broken links and no forks (checked over all receipts, not a window)
        forkCount:
          type: integer
          description: Number of prevHash values claimed by more than one receipt (indicates concurrent write races)
        brokenLinkCount:
          type: integer
          description: Number of receipts whose prevHash does not match any existing chainHash
        genesisCount:
          type: integer
          description: Number of receipts with null prevHash; a valid non-empty chain has exactly one
        entries:
          type: array
          description: Most recent receipts (up to 100) for display. Integrity is verified over the full chain.
          items:
            type: object
            properties:
              id:
                type: string
              chainHash:
                type: string
              prevHash:
                type: string
                nullable: true
              createdAt:
                type: string
                format: date-time
            required:
              - id
              - chainHash
              - createdAt
      required:
        - length
        - headHash
        - intact
        - forkCount
        - brokenLinkCount
        - genesisCount
        - entries

    WebhookEndpoint:
      type: object
      description: >
        A user-configured webhook delivery target for policy violation alerts.
        Secrets are never returned in responses; hasSecret indicates whether one
        is configured.
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        hasSecret:
          type: boolean
          description: True when an HMAC secret is configured; the secret itself is never returned.
        enabled:
          type: boolean
        eventFilter:
          type: string
          enum: [all, critical, high_and_critical]
          description: >
            Controls which violation severities trigger a delivery.
            all = any violation, critical = critical severity only,
            high_and_critical = high or critical severity.
        emailAlerts:
          type: boolean
          description: >
            Stored preference for email alerts on critical violations. Email
            delivery is not yet active — it is pending per-endpoint recipient
            address support (task #45). The field is accepted and stored so
            integrations can persist the preference ahead of that release.
        policyIds:
          type: array
          items:
            type: string
          nullable: true
          description: >
            Optional list of specific policy IDs to match. When set and non-empty,
            overrides eventFilter: only violations against these specific policies
            trigger delivery. Pass null or omit to use severity-based eventFilter.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - url
        - hasSecret
        - enabled
        - eventFilter
        - emailAlerts
        - createdAt
        - updatedAt

    WebhookEndpointList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEndpoint"
        total:
          type: integer
      required:
        - items
        - total

    CreateWebhookBody:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          maxLength: 2000
          description: >
            HTTPS (or HTTP) URL to POST policy violation events to. Private IP
            ranges, loopback, and link-local addresses are rejected.
        secret:
          type: string
          maxLength: 256
          description: >
            Optional HMAC-SHA256 key. When set, every delivery includes an
            X-AIGovOps-Signature header with "sha256=<hex>" so your endpoint
            can verify authenticity.
        eventFilter:
          type: string
          enum: [all, critical, high_and_critical]
          default: all
        emailAlerts:
          type: boolean
          default: false
          description: >
            Opt in to email alerts for critical-severity violations.
            Requires SMTP to be configured server-side.
        policyIds:
          type: array
          items:
            type: string
          maxItems: 50
          description: >
            Optional list of specific policy IDs that should trigger this endpoint.
            When provided and non-empty, overrides eventFilter.

    UpdateWebhookBody:
      type: object
      properties:
        url:
          type: string
          format: uri
          maxLength: 2000
        secret:
          type: [string, 'null']
          maxLength: 256
          description: Pass null to clear the existing HMAC secret.
        enabled:
          type: boolean
        eventFilter:
          type: string
          enum: [all, critical, high_and_critical]
        emailAlerts:
          type: boolean
        policyIds:
          type: array
          items:
            type: string
          maxItems: 50
          nullable: true
          description: >
            Set to an array to filter by specific policy IDs, or null to clear
            existing policy ID filter and revert to severity-based eventFilter.

    WebhookTestResult:
      type: object
      description: Result of a test webhook delivery attempt.
      properties:
        ok:
          type: boolean
          description: True when the endpoint returned a 2xx status.
        statusCode:
          type: integer
          nullable: true
          description: HTTP response code from the endpoint; null if the request failed entirely.
        error:
          type: string
          nullable: true
          description: Error message if the request failed (timeout, DNS error, etc.).
      required:
        - ok

    WebhookDelivery:
      type: object
      description: A single webhook delivery attempt record.
      properties:
        id:
          type: string
        webhookEndpointId:
          type: string
        receiptId:
          type: string
        status:
          type: string
          enum: [pending, delivered, failed]
        attempts:
          type: integer
          description: Number of delivery attempts made so far.
        lastAttemptAt:
          type: string
          format: date-time
          nullable: true
        responseCode:
          type: integer
          nullable: true
          description: Last HTTP response code from the endpoint.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - webhookEndpointId
        - receiptId
        - status
        - attempts
        - createdAt

    WebhookDeliveryList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WebhookDelivery"
      required:
        - items

    DemoMintBody:
      type: object
      description: >
        Visitor-supplied input for POST /demo/mint. No live LLM call is made;
        the server simply hashes and chains the supplied content. Hard caps
        match the body-size limits enforced in the route handler.
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 2048
          description: The AI prompt the visitor sent. Maximum 2 KiB.
        response:
          type: string
          minLength: 1
          maxLength: 32768
          description: The AI response the visitor received. Maximum 32 KiB.
        model:
          type: string
          minLength: 1
          maxLength: 100
          description: Model identifier string (e.g. "gpt-4o", "claude-3-5-sonnet").
      required:
        - prompt
        - response
        - model

    DemoReceipt:
      type: object
      description: >
        A single receipt on the public demo chain. Same cryptographic shape as
        an authenticated Interaction but without the userId field (every demo
        receipt belongs to a single shared synthetic user, which is an
        implementation detail not exposed to anonymous callers).
      properties:
        id:
          type: string
        prompt:
          type: string
        response:
          type: string
        model:
          type: string
        tags:
          type: array
          items:
            type: string
        promptHash:
          type: string
        responseHash:
          type: string
        prevHash:
          type: string
          nullable: true
        chainHash:
          type: string
        policyStatus:
          type: string
          enum: [pass, fail, pending, error]
        policyViolations:
          type: array
          items:
            type: string
          description: >
            Frozen list of violations baked into the seeded fixture (e.g.
            "[CRITICAL] Phishing / Social Engineering Request"). Always
            empty for visitor-supplied mints — demo writes do not run policy
            evaluation.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - prompt
        - response
        - model
        - tags
        - promptHash
        - responseHash
        - chainHash
        - policyStatus
        - policyViolations
        - createdAt

    DemoChain:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DemoReceipt"
        total:
          type: integer
          description: Total number of receipts on the demo chain (may exceed items.length when capped).
      required:
        - items
        - total

openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AIGovOps REPLAY API - cryptographically signed AI interaction receipts
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: interactions
    description: AI interaction receipt operations
  - name: policies
    description: Policy-as-code rule operations
  - name: stats
    description: Dashboard statistics
  - name: audit
    description: Admin-only audit log integrity operations
  - name: export
    description: Portable chain export endpoints (JSONL, HTML bundle, SQLite)
paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      security: []
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      security: []
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    post:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      security: []
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Session cleared. Navigate the browser to the returned URL to complete OIDC logout.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowserLogoutSuccess'
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      security: []
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /interactions:
    get:
      operationId: listInteractions
      tags: [interactions]
      summary: List all interaction receipts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
            maximum: 100000
        - name: model
          in: query
          schema:
            type: string
        - name: policyStatus
          in: query
          schema:
            type: string
            enum: [pass, fail, pending, error]
      responses:
        "200":
          description: List of interaction receipts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractionList"
    post:
      operationId: createInteraction
      tags: [interactions]
      summary: Create a new AI interaction receipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInteractionBody"
      responses:
        "201":
          description: Created interaction receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interaction"

  /interactions/{id}:
    get:
      operationId: getInteraction
      tags: [interactions]
      summary: Get a single interaction receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Interaction receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Interaction"
        "404":
          description: Not found

  /interactions/{id}/verify:
    get:
      operationId: verifyInteraction
      tags: [interactions]
      summary: Verify the cryptographic chain for a receipt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"

  /interactions/{id}/replay:
    post:
      operationId: replayInteraction
      tags: [interactions]
      summary: Replay an interaction and compare outputs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Replay result with diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayResult"

  /policies:
    get:
      operationId: listPolicies
      tags: [policies]
      summary: List all policy rules
      responses:
        "200":
          description: List of policies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyList"
    post:
      operationId: createPolicy
      tags: [policies]
      summary: Create a new policy rule
      description: Requires admin privilege (caller's user ID must be in the ADMIN_USER_IDS server environment variable).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePolicyBody"
      responses:
        "201":
          description: Created policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "403":
          description: Forbidden — admin privilege required
        "422":
          description: >
            Unprocessable — rule expression failed semantic validation.
            The rule may reference disallowed identifiers, use forbidden
            constructs (eval, new Function, etc.), or exceed 500 characters.

  /policies/{id}:
    get:
      operationId: getPolicy
      tags: [policies]
      summary: Get a single policy rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
    patch:
      operationId: updatePolicy
      tags: [policies]
      summary: Update a policy rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePolicyBody"
      responses:
        "200":
          description: Updated policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "403":
          description: Forbidden — admin privilege required
        "422":
          description: >
            Unprocessable — rule expression failed semantic validation.
            The rule may reference disallowed identifiers, use forbidden
            constructs (eval, new Function, etc.), or exceed 500 characters.
    delete:
      operationId: deletePolicy
      tags: [policies]
      summary: Delete a policy rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /chain:
    get:
      operationId: getChain
      tags: [interactions]
      summary: Get the full hash chain summary
      description: >
        Returns integrity metadata for the authenticated user's receipt chain.
        `length` is the total number of the caller's receipts (full count, not
        a windowed subset). `intact` and the fork/broken-link counts are
        computed over all of the caller's receipts with no window limit.
        `entries` contains the caller's most recent 100 receipts for display
        purposes only — integrity is always verified over the full set.
      responses:
        "200":
          description: Hash chain summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainSummary"

  /audit/chain-status:
    get:
      operationId: getAuditChainStatus
      tags: [audit]
      summary: Verify the integrity of the audit log hash chain
      description: >
        Admin-only. Walks all activity_log entries that have a logHash (post-migration
        rows) in chronological order and re-derives each entry's expected logHash from
        its stored fields and the expected prevLogHash from the chain walk. Any
        mismatch — tampered data fields, deleted rows, reordered entries, or modified
        hashes — increments the tampered counter. Pre-migration rows with NULL logHash
        are counted in `total` but excluded from verification.
      security:
        - adminCookieAuth: []
      responses:
        "200":
          description: Audit log chain status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditChainStatus"
        "401":
          description: Unauthorized — admin session required
        "503":
          description: Service unavailable — ADMIN_API_KEY not configured

  /export/jsonl:
    get:
      operationId: exportChainJsonl
      tags: [export]
      summary: Export the full receipt chain as JSONL
      description: >
        Streams the authenticated user's receipts as newline-delimited JSON (one
        object per line), ordered oldest-first. Each line contains all receipt
        fields including hashes. The file is chunked so very large chains are
        never fully buffered in memory. Filename pattern:
        aigovops-chain-{userId}-{date}.jsonl
      responses:
        "200":
          description: JSONL stream of receipts
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="aigovops-chain-{userId}-{date}.jsonl"
          content:
            application/x-ndjson:
              schema:
                type: string
        "401":
          description: Unauthorized — authentication required

  /export/html:
    get:
      operationId: exportChainHtml
      tags: [export]
      summary: Export the receipt chain as a self-contained HTML bundle
      description: >
        Returns a single .html file with all receipts rendered as cards plus
        embedded JavaScript that re-derives every chainHash client-side on load
        and shows a green "Chain intact" or red "Tampered" banner. No external
        dependencies. Filename pattern: aigovops-chain-{userId}-{date}.html
      responses:
        "200":
          description: Self-contained HTML bundle
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="aigovops-chain-{userId}-{date}.html"
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Unauthorized — authentication required

  /export/sqlite:
    get:
      operationId: exportChainSqlite
      tags: [export]
      summary: Export the receipt chain as a SQLite database
      description: >
        Returns a .db file containing an interactions table populated with all
        of the requesting user's receipts. Compatible with the sqlite3 CLI and
        DB Browser for SQLite. Filename pattern:
        aigovops-chain-{userId}-{date}.db
      responses:
        "200":
          description: SQLite database file
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="aigovops-chain-{userId}-{date}.db"
          content:
            application/x-sqlite3:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized — authentication required

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    adminCookieAuth:
      type: apiKey
      in: cookie
      name: aigovops_admin
      description: Session token passed as a Bearer token in the Authorization header (used by mobile clients)

  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    BrowserLogoutSuccess:
      type: object
      required: [redirectUrl]
      properties:
        redirectUrl:
          type: string
          format: uri
          description: The OIDC provider logout URL to navigate the browser to.
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string


    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Interaction:
      type: object
      properties:
        id:
          type: string
        prompt:
          type: string
        response:
          type: string
        model:
          type: string
        userId:
          type: string
        tags:
          type: array
          items:
            type: string
        promptHash:
          type: string
        responseHash:
          type: string
        prevHash:
          type: string
          nullable: true
        chainHash:
          type: string
        policyStatus:
          type: string
          enum: [pass, fail, pending, error]
        policyViolations:
          type: array
          description: >
            List of policy violations triggered by this receipt. Each entry
            contains the severity label and policy name only (e.g.
            "[HIGH] No PII in prompts"). The rule expression is intentionally
            omitted to prevent users from reverse-engineering governance logic
            and evading future policy checks. Full rule details are available
            to administrators via the policy management endpoints.
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        replayCount:
          type: integer
      required:
        - id
        - prompt
        - response
        - model
        - userId
        - tags
        - promptHash
        - responseHash
        - chainHash
        - policyStatus
        - policyViolations
        - createdAt
        - replayCount

    InteractionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Interaction"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
      required:
        - items
        - total
        - limit
        - offset

    CreateInteractionBody:
      type: object
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 32768
          description: The AI prompt text. Maximum 32 KiB to prevent per-field resource exhaustion.
        response:
          type: string
          minLength: 1
          maxLength: 32768
          description: The AI response text. Maximum 32 KiB to prevent per-field resource exhaustion.
        model:
          type: string
          minLength: 1
          maxLength: 200
          description: Model identifier string (e.g. "gpt-4o"). Maximum 200 characters.
        tags:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 100
          description: Optional classification tags. Maximum 50 tags, each up to 100 characters.
      required:
        - prompt
        - response
        - model

    VerificationResult:
      type: object
      description: >
        Result of a multi-step cryptographic chain verification. Four independent
        checks are performed and combined into a single `valid` verdict:
        (1) prompt content hash re-computation,
        (2) response content hash re-computation,
        (3) chainHash self-consistency check (recomputed from stored promptHash,
            responseHash, and prevHash) plus predecessor existence check plus
            recursive-CTE ancestry walk for forks, and
        (4) global genesis uniqueness (exactly one receipt with null prevHash).
        `valid` is true only when all four checks pass.
      properties:
        id:
          type: string
        valid:
          type: boolean
          description: >
            True only when prompt hash, response hash, chainHash, predecessor
            existence, ancestry fork detection, and genesis uniqueness all pass.
        promptHashMatch:
          type: boolean
          description: Re-computed prompt hash matches the stored promptHash.
        responseHashMatch:
          type: boolean
          description: Re-computed response hash matches the stored responseHash.
        chainIntact:
          type: boolean
          description: >
            True when: chainHash is self-consistent with stored fields; the
            predecessor receipt exists (if prevHash is non-null); no fork is
            detected anywhere in this receipt's ancestry; and there is exactly
            one genesis entry globally.
        details:
          type: string
          description: >
            Human-readable summary. On failure, lists each specific check that
            failed (e.g. "predecessor receipt not found", "fork detected in
            ancestry", "multiple genesis entries").
        checkedAt:
          type: string
          format: date-time
      required:
        - id
        - valid
        - promptHashMatch
        - responseHashMatch
        - chainIntact
        - details
        - checkedAt

    ReplayResult:
      type: object
      properties:
        originalId:
          type: string
        originalResponse:
          type: string
        replayedResponse:
          type: string
        outputDiff:
          type: string
        semanticMatch:
          type: boolean
        replayedAt:
          type: string
          format: date-time
        newReceiptId:
          type: string
      required:
        - originalId
        - originalResponse
        - replayedResponse
        - outputDiff
        - semanticMatch
        - replayedAt
        - newReceiptId

    Policy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        rule:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        enabled:
          type: boolean
        violationCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - rule
        - severity
        - enabled
        - violationCount
        - createdAt
        - updatedAt

    PolicyList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Policy"
        total:
          type: integer
      required:
        - items
        - total

    CreatePolicyBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        rule:
          type: string
          minLength: 1
          maxLength: 500
          description: >
            A safe expression evaluated against each new interaction receipt.
            Allowed variables: prompt, response, model, userId.
            Allowed operators: &&, ||, !, ===, !==, <, >, <=, >=, typeof.
            Allowed string methods: .includes(), .startsWith(), .endsWith(),
            .toLowerCase(), .toUpperCase(), .trim(), .split(), .length.
            No code execution: eval, new Function, process, require, and
            globalThis are not reachable. Maximum 500 characters.
        severity:
          type: string
          enum: [low, medium, high, critical]
        enabled:
          type: boolean
      required:
        - name
        - description
        - rule
        - severity

    UpdatePolicyBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        rule:
          type: string
          minLength: 1
          maxLength: 500
          description: >
            A safe expression evaluated against each new interaction receipt.
            Allowed variables: prompt, response, model, userId.
            Allowed operators: &&, ||, !, ===, !==, <, >, <=, >=, typeof.
            Allowed string methods: .includes(), .startsWith(), .endsWith(),
            .toLowerCase(), .toUpperCase(), .trim(), .split(), .length.
            No code execution: eval, new Function, process, require, and
            globalThis are not reachable. Maximum 500 characters.
        severity:
          type: string
          enum: [low, medium, high, critical]
        enabled:
          type: boolean

    Stats:
      type: object
      properties:
        totalInteractions:
          type: integer
        verifiedCount:
          type: integer
        policyPassCount:
          type: integer
        policyFailCount:
          type: integer
        replayCount:
          type: integer
        modelsUsed:
          type: array
          maxItems: 200
          items:
            type: string
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        chainLength:
          type: integer
          description: >
            Total number of receipts in the global chain across all users
            (full count, not a windowed subset).
        chainIntact:
          type: boolean
          description: >
            True only when the global chain (all users, all receipts) has no
            broken links and no forks (checked over the entire chain, not a
            windowed subset).
      required:
        - totalInteractions
        - verifiedCount
        - policyPassCount
        - policyFailCount
        - replayCount
        - modelsUsed
        - recentActivity
        - chainLength
        - chainIntact

    ActivityItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [created, replayed, verified, policy_check]
        interactionId:
          type: string
        summary:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - interactionId
        - summary
        - createdAt

    AuditChainStatus:
      type: object
      description: >
        Integrity status of the activity_log hash chain. Entries with NULL logHash
        (pre-migration legacy rows) are counted in `total` but excluded from
        `hashableEntries` and hash verification.
      properties:
        total:
          type: integer
          description: Total activity_log rows (including pre-migration rows without hashes)
        hashableEntries:
          type: integer
          description: Rows with a logHash that participate in chain verification
        intact:
          type: boolean
          description: >
            True only when all hashable entries re-verify correctly in sequence.
            False if any entry's logHash does not match the re-derived expected hash.
        tampered:
          type: integer
          description: Count of hashable entries that failed hash verification
        headHash:
          type: string
          nullable: true
          description: logHash of the most recent hashable entry; null if no hashed entries exist
        verifiedAt:
          type: string
          format: date-time
          description: Timestamp of when this verification was performed
      required:
        - total
        - hashableEntries
        - intact
        - tampered
        - verifiedAt

    ChainSummary:
      type: object
      properties:
        length:
          type: integer
          description: Total number of receipts in the chain (full count, not a window)
        headHash:
          type: string
        tailHash:
          type: string
          nullable: true
        intact:
          type: boolean
          description: True only when the full chain has no broken links and no forks (checked over all receipts, not a window)
        forkCount:
          type: integer
          description: Number of prevHash values claimed by more than one receipt (indicates concurrent write races)
        brokenLinkCount:
          type: integer
          description: Number of receipts whose prevHash does not match any existing chainHash
        genesisCount:
          type: integer
          description: Number of receipts with null prevHash; a valid non-empty chain has exactly one
        entries:
          type: array
          description: Most recent receipts (up to 100) for display. Integrity is verified over the full chain.
          items:
            type: object
            properties:
              id:
                type: string
              chainHash:
                type: string
              prevHash:
                type: string
                nullable: true
              createdAt:
                type: string
                format: date-time
            required:
              - id
              - chainHash
              - createdAt
      required:
        - length
        - headHash
        - intact
        - forkCount
        - brokenLinkCount
        - genesisCount
        - entries
